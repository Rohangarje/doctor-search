{% extends 'base.html' %}

{% block content %}

<div class="form-box">
    <h2>Login</h2>
    {% if message %}
        <div style="color: #d32f2f; margin-bottom: 10px;">{{ message }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
